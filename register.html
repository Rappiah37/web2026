<header>

  <nav>
    <a href="index.html">Home</a>

    <a href="contact.html">Contact</a>

<main>
  <section class="form-section">
    <h2>Student Registration Form</h2>
    <p>Please complete the form below to register for the Sterile Processing / Central Service Technician course.</p>

    <form action="https://formsubmit.co/arichardkwaku@gmail.com" method="POST">

      <input type="hidden" name="_subject" value="New Student Registration - Erns Consultant">
      <input type="hidden" name="_template" value="table">
      <input type="hidden" name="_captcha" value="true">
      <input type="hidden" name="_next" value="https://rappiah37.github.io/web2026/thank-you.html">
      <input type="hidden" name="_autoresponse" value="Thank you for registering with Erns Consultant. We have received your registration. Our team will contact you soon.">
      <input type="text" name="_honey" style="display:none">

      <label>Full Name</label>
      <input type="text" name="Full Name" required>

      <label>Email Address</label>
      <input type="email" name="email" required>

      <label>Phone Number</label>
      <input type="tel" name="Phone Number" required>

      <label>Address</label>
      <input type="text" name="Address" required>

      <label>City</label>
      <input type="text" name="City" required>

      <label>State</label>
      <input type="text" name="State" required>

      <label>ZIP Code</label>
      <input type="text" name="ZIP Code" required>

      <label>Preferred Class Schedule</label>
      <select name="Preferred Class Schedule" required>
        <option value="">Select One</option>
        <option>Weekday Class</option>
        <option>Weekend Class</option>
        <option>Evening Class</option>
      </select>

      <label>Do you have healthcare experience?</label>
      <select name="Healthcare Experience" required>
        <option value="">Select One</option>
        <option>Yes</option>
        <option>No</option>
      </select>

      <label>Message / Questions</label>
      <textarea name="Message" rows="5"></textarea>

      <button type="submit">Submit Registration</button>

    </form>
  </section>
</main>

</body>
</html>
